# MySQL. Versions 5.6.4 and up are supported.
#
# Install the MySQL driver
#   gem install mysql2
#
# Ensure the MySQL gem is defined in your Gemfile
#   gem "mysql2"
#
# And be sure to use new-style password hashing:
#   https://dev.mysql.com/doc/refman/5.7/en/password-hashing.html
#
default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["MYSQLUSER"] %>
  password: <%= ENV["MYSQLPASSWORD"] %>
  host: <%= ENV.fetch("MYSQLHOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("MYSQLPORT") { 3306 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") { "janza_bet_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") { "janza_bet_development" }.sub(/_development$/, "_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME") { "janza_bet_production" } %>
  cache:
    <<: *primary_production
    database: <%= "#{ENV.fetch("DB_NAME") { "janza_bet_production" }}_cache" %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= "#{ENV.fetch("DB_NAME") { "janza_bet_production" }}_queue" %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= "#{ENV.fetch("DB_NAME") { "janza_bet_production" }}_cable" %>
    migrations_paths: db/cable_migrate
